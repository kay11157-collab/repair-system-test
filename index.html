<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 避免瀏覽器把這個頁面整包快取起來，導致每次更新 GitHub Pages 上的檔案後
     還要重新整理好幾次才會真的載到新版本。 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>機台維修管理系統</title>
<style>
  :root{
    --bg:#F5F6F5;
    --panel:#FFFFFF;
    --ink:#1E2421;
    --ink-soft:#5B655F;
    --line:#DDE2DE;
    --brand:#2F6F4E;
    --brand-soft:#E6F0EA;
    --warn:#B8542A;
    --warn-soft:#FBEAE0;
    --danger:#B23A3A;
    --radius:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);}
  header{
    background:var(--panel);border-bottom:1px solid var(--line);
    padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:10;
  }
  header h1{font-size:18px;margin:0;font-weight:700;}
  header .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  #apiBtn{
    border:1px solid var(--line);background:var(--panel);border-radius:8px;
    padding:8px 14px;font-size:13px;cursor:pointer;color:var(--ink-soft);
  }
  #apiBtn:hover{border-color:var(--brand);color:var(--brand);}
  nav{display:flex;gap:4px;padding:12px 24px 0;background:var(--panel);border-bottom:1px solid var(--line);}
  nav button{
    border:none;background:transparent;padding:10px 16px;font-size:14px;cursor:pointer;
    color:var(--ink-soft);border-bottom:2px solid transparent;font-weight:600;
  }
  nav button.active{color:var(--brand);border-bottom-color:var(--brand);}
  main{padding:24px 32px;max-width:1800px;margin:0 auto;}
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  .stat-card .label{font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
  .stat-card .value{font-size:26px;font-weight:700;}
  .stat-card .note{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .stat-card.warn .value{color:var(--warn);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  input[type=text],select{
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:var(--ink);
  }
  .btn{
    border:none;background:var(--brand);color:#fff;padding:8px 16px;border-radius:8px;
    font-size:13px;cursor:pointer;font-weight:600;
  }
  .btn:hover{opacity:.9;}
  .btn.secondary{background:var(--panel);color:var(--brand);border:1px solid var(--brand);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{color:var(--ink-soft);font-weight:600;font-size:12px;position:sticky;top:0;background:var(--panel);}
  tbody tr:hover{background:var(--bg);}
  .table-wrap{overflow:auto;max-height:60vh;border:1px solid var(--line);border-radius:8px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;background:var(--brand-soft);color:var(--brand);}
  .badge.low{background:var(--warn-soft);color:var(--warn);}
  .empty{color:var(--ink-soft);font-size:13px;padding:30px;text-align:center;}
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(20,24,22,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
  }
  .modal-backdrop.show{display:flex;}
  .modal{background:#fff;border-radius:var(--radius);padding:22px;width:100%;max-width:480px;max-height:88vh;overflow:auto;}
  .modal h3{margin-top:0;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .msg{font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:12px;}
  .msg.error{background:var(--warn-soft);color:var(--warn);}
  .msg.ok{background:var(--brand-soft);color:var(--brand);}
  .loading{text-align:center;color:var(--ink-soft);padding:40px;font-size:13px;}
  .pagination{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .page-info{font-size:12px;color:var(--ink-soft);}
  .page-controls{display:flex;align-items:center;gap:6px;}
  .page-num{font-size:13px;color:var(--ink-soft);padding:0 6px;white-space:nowrap;}
  .btn.secondary:disabled{opacity:.4;cursor:not-allowed;}

  .type-block{margin-bottom:20px;}
  .type-block:last-child{margin-bottom:0;}
  .type-block-header{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:10px;}
  .type-block-header .type-total{font-weight:400;font-size:12px;color:var(--ink-soft);margin-left:4px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--brand);display:inline-block;}
  .type-dot{background:#3B6FD1;}
  .status-pill-row{display:flex;flex-wrap:wrap;gap:8px;}
  .status-pill{
    display:inline-flex;align-items:center;gap:6px;
    border-radius:100px;padding:6px 12px;font-size:12px;font-weight:600;
  }
  .status-pill .dot{width:6px;height:6px;}
  .status-pill b{font-size:14px;margin-left:2px;}

  .repair-layout{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
  @media (max-width:900px){ .repair-layout{grid-template-columns:1fr;} }
  .low-stock-panel{position:sticky;top:80px;}
  .low-stock-item{padding:10px 0;border-bottom:1px solid var(--line);}
  .low-stock-item:last-child{border-bottom:none;}
  .low-stock-name{font-size:13px;font-weight:600;}
  .low-stock-meta{font-size:11px;color:var(--ink-soft);margin:2px 0 4px;}
  .low-stock-qty{font-size:12px;color:var(--ink-soft);}
  .detail-table{width:100%;border-collapse:collapse;}
  .detail-table td{padding:8px 6px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top;}
  .detail-table .detail-label{color:var(--ink-soft);width:40%;font-weight:600;}

  .detail-modal{max-width:820px;}
  .repair-detail-modal{max-width:760px;}
  .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modal-close{border:none;background:transparent;font-size:18px;cursor:pointer;color:var(--ink-soft);line-height:1;}
  .modal-close:hover{color:var(--ink);}

  .stepper{display:flex;align-items:flex-start;overflow-x:auto;padding:6px 2px 14px;margin-bottom:14px;border-bottom:1px solid var(--line);}
  .step{display:flex;flex-direction:column;align-items:center;width:64px;flex-shrink:0;}
  .step-circle{
    width:22px;height:22px;border-radius:50%;background:var(--bg);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink-soft);
  }
  .step-active .step-circle{border:none;}
  .step-label{font-size:9px;color:var(--ink-soft);text-align:center;margin-top:5px;line-height:1.3;white-space:normal;word-break:break-word;}
  .step-active .step-label{color:var(--ink);font-weight:700;}
  .step-line{width:6px;height:1px;background:var(--line);margin:10px 0 0;flex-shrink:0;}

  .detail-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .info-card{background:var(--bg);border-radius:8px;padding:10px 12px;}
  .info-label{font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  .info-value{font-size:14px;font-weight:600;}

  .update-status-box{background:var(--brand-soft);border-radius:10px;padding:16px;margin-bottom:16px;}
  .update-status-box .field label{color:var(--brand);}

  .issue-box{background:var(--bg);border-radius:10px;padding:14px 16px;}
  .issue-header{display:flex;justify-content:space-between;align-items:center;}

  .filter-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .filter-pill{
    border:1px solid transparent;background:var(--pill-bg, #F0F2F4);color:var(--pill-fg, var(--ink-soft));
    border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;
    transition:box-shadow .12s,filter .12s;
  }
  .filter-pill:hover{filter:brightness(0.96);}
  .filter-pill.active{box-shadow:0 0 0 2px var(--pill-fg, var(--brand)) inset;}

  .timeline{max-height:260px;overflow-y:auto;}
  .tl-block{margin-bottom:16px;}
  .tl-block:last-child{margin-bottom:0;}
  .tl-block-title{font-size:12px;font-weight:700;color:var(--brand);margin-bottom:8px;}
  .tl-item{position:relative;padding-left:16px;padding-bottom:10px;border-left:2px solid var(--line);margin-left:2px;}
  .tl-item:last-child{padding-bottom:0;border-left:2px solid transparent;}
  .tl-dot{position:absolute;left:-6px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--brand);border:2px solid #fff;box-shadow:0 0 0 1px var(--brand);}
  .tl-event{font-size:13px;font-weight:600;}
  .tl-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
</style>
</head>
<body>

<header>
  <div>
    <h1>機台維修管理系統</h1>
    <div class="sub" id="statusLine">尚未連線</div>
  </div>
  <button id="apiBtn">設定 API 位址</button>
</header>

<nav id="tabs">
  <button data-tab="dashboard" class="active">總覽</button>
  <button data-tab="machines">機台總覽</button>
  <button data-tab="repair">維修紀錄</button>
  <button data-tab="inventory">備品庫存</button>
  <button data-tab="lowstock">低庫存零件</button>
</nav>

<main id="main">
  <div class="loading">請先設定 Google Apps Script 的 API 位址</div>
</main>

<!-- API 設定 modal -->
<div class="modal-backdrop" id="apiModal">
  <div class="modal">
    <h3>設定 API 位址</h3>
    <p style="font-size:13px;color:var(--ink-soft);">請貼上你部署 Google Apps Script 網頁應用程式後拿到的網址（結尾通常是 <code>/exec</code>）。</p>
    <div class="field">
      <label>Apps Script Web App 網址</label>
      <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec">
    </div>
    <div id="apiMsg"></div>
    <div class="modal-actions">
      <button class="btn secondary" id="apiCancel">取消</button>
      <button class="btn" id="apiSave">儲存並連線</button>
    </div>
  </div>
</div>

<!-- 新增機台 modal -->
<div class="modal-backdrop" id="machineModal">
  <div class="modal">
    <h3>新增機台</h3>
    <div id="machineMsg"></div>
    <div class="field">
      <label>機台序號 (sn) *</label>
      <input type="text" id="m_sn" placeholder="FCM-A01000001">
    </div>
    <div class="field">
      <label>類型 (type) *</label>
      <select id="m_type"></select>
    </div>
    <div class="field">
      <label>狀態 (status) *</label>
      <select id="m_status"></select>
    </div>
    <div class="field">
      <label>店號 (store_no)</label>
      <input type="text" id="m_store_no">
    </div>
    <div class="field">
      <label>問題描述 (issue)</label>
      <input type="text" id="m_issue">
    </div>
    <div class="field">
      <label>負責人 (owner)</label>
      <input type="text" id="m_owner">
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="machineCancel">取消</button>
      <button class="btn" id="machineSave">新增</button>
    </div>
  </div>
</div>

<!-- 機台詳情 modal -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal detail-modal">
    <div class="detail-header">
      <h3 id="detailModalTitle" style="margin:0;">機台詳情</h3>
      <button class="modal-close" id="detailModalClose">✕</button>
    </div>
    <div class="stepper" id="detailStepper"></div>
    <div class="detail-info-grid" id="detailInfoGrid"></div>

    <div class="update-status-box">
      <h4 style="margin:0 0 12px;color:var(--brand);">更新狀態</h4>
      <div class="field"><label>切換狀態</label><select id="d_status"></select></div>
      <div class="field"><label>操作人員</label><select id="d_operator"><option value="">請選擇</option></select></div>
      <div class="field"><label>備註（本次操作）</label><input type="text" id="d_note" placeholder="填寫本步驟的操作備註"></div>
      <div class="field"><label>更換零件（可空白）</label><input type="text" id="d_parts" placeholder="例如：驅動模組 A × 1"></div>
    </div>

    <div class="issue-box">
      <div class="issue-header">
        <span style="font-weight:700;">問題描述</span>
        <button class="btn secondary" id="d_issueEditBtn">編輯</button>
      </div>
      <div id="d_issueText" style="margin-top:8px;font-size:13px;color:var(--ink);"></div>
      <div id="d_issueEditRow" style="display:none;margin-top:8px;gap:8px;">
        <input type="text" id="d_issueInput" style="width:100%;margin-bottom:8px;">
        <button class="btn" id="d_issueSaveBtn">儲存問題描述</button>
      </div>
    </div>

    <h4 style="margin:18px 0 10px;">機台生命週期時間軸</h4>
    <div id="detailTimeline" class="timeline"></div>

    <h4 style="margin:18px 0 10px;">操作記錄</h4>
    <div class="table-wrap" style="max-height:220px;"><table>
      <thead><tr><th>步驟</th><th>備註</th><th>零件</th><th>操作人</th><th>時間</th></tr></thead>
      <tbody id="detailLogRows"></tbody>
    </table></div>

    <div id="detailMsg"></div>
    <div class="modal-actions">
      <button class="btn secondary" id="detailModalClose2">關閉</button>
      <button class="btn" id="d_updateBtn">更新狀態</button>
    </div>
  </div>
</div>

<!-- 維修紀錄詳情 modal（第一版，欄位：機器問題／檢修問題／更換零件／檢修完成日期／檢修人員） -->
<div class="modal-backdrop" id="repairDetailModal">
  <div class="modal repair-detail-modal">
    <div class="detail-header">
      <h3 style="margin:0;">維修紀錄歷程</h3>
      <button class="modal-close" id="repairDetailModalClose">✕</button>
    </div>
    <div id="repairDetailInfo" style="margin:10px 0 16px;font-size:13px;color:var(--ink-soft);"></div>
    <div id="repairDetailMsg"></div>
    <div class="field">
      <label>機器問題</label>
      <textarea id="rd_issue" rows="3" style="width:100%;"></textarea>
    </div>
    <div class="field">
      <label>檢修問題</label>
      <textarea id="rd_other_issue" rows="8" style="width:100%;"></textarea>
    </div>
    <div class="field">
      <label>更換零件</label>
      <textarea id="rd_parts" rows="4" style="width:100%;" placeholder="例如：驅動模組 A × 1"></textarea>
    </div>
    <div class="field">
      <label>檢修完成日期</label>
      <input type="date" id="rd_done_date">
    </div>
    <div class="field">
      <label>檢修人員</label>
      <select id="rd_operator"><option value="">請選擇</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="repairDetailCancel">取消</button>
      <button class="btn" id="repairDetailSave">儲存</button>
    </div>
  </div>
</div>

<script>
const LS_KEY = 'repair_system_api_url';
let API_URL = localStorage.getItem(LS_KEY) || '';
let DATA = null;
let currentTab = 'dashboard';

// 固定的狀態顯示順序（所有類型都照這個順序排列，方便垂直比對）
const STATUS_ORDER = [
  'STORE', 'STORE - 異常', '台灣倉', '台灣維修中',
  '在途 - 台灣 TO NID', '在途-NID TO 台灣',
  'NID - 良品', 'NID - 待退回台灣', 'NLA - 良品'
];

// 每個狀態固定的顏色（背景色 / 文字色），全站統一使用
const STATUS_COLORS = {
  'STORE':              { bg:'#E6F0EA', fg:'#2F6F4E' }, // 綠
  'STORE - 異常':        { bg:'#FBE0E0', fg:'#8A1F1F' }, // 深紅
  '台灣倉':               { bg:'#E8F0FB', fg:'#2B5FA5' }, // 藍
  '台灣維修中':            { bg:'#FBE7E7', fg:'#B23A3A' }, // 紅
  '在途 - 台灣 TO NID':    { bg:'#FBEFDD', fg:'#B8752A' }, // 橙
  '在途-NID TO 台灣':      { bg:'#FBEFDD', fg:'#B8752A' }, // 橙
  'NID - 良品':           { bg:'#E1F5F0', fg:'#1F8A72' }, // 青
  'NID - 待退回台灣':      { bg:'#F1E7FB', fg:'#7A3AB2' }, // 紫
  'NLA - 良品':           { bg:'#EDEDED', fg:'#666666' }  // 灰
};
const DEFAULT_STATUS_COLOR = { bg:'#E6F0EA', fg:'#2F6F4E' };

// 維修紀錄（repair_log）的「機器狀態」是另外一組完全不同的狀態值，
// 跟機台總覽的狀態不是同一套。這三種已知狀態維持有語意的顏色（橙=待處理/綠=完成/紅=無法維修），
// 其他任何沒列在這裡的狀態值，會自動從下面的色盤裡分配一個還沒用過的顏色，確保每種狀態顏色都不同。
const REPAIR_STATUS_ORDER = ['待維修', '維修完成', '無法維修'];
const REPAIR_KNOWN_COLORS = {
  '待維修':   { bg:'#FBEFDD', fg:'#B8752A' }, // 橙 - 還沒處理
  '維修完成': { bg:'#E6F0EA', fg:'#2F6F4E' }, // 綠 - 已完成
  '無法維修': { bg:'#FBE0E0', fg:'#8A1F1F' }  // 紅 - 無法維修
};
const REPAIR_COLOR_PALETTE = [
  { bg:'#E8F0FB', fg:'#2B5FA5' }, // 藍
  { bg:'#F1E7FB', fg:'#7A3AB2' }, // 紫
  { bg:'#E1F5F0', fg:'#1F8A72' }, // 青
  { bg:'#FDF0D5', fg:'#9C6B0A' }, // 金黃
  { bg:'#FDE6F0', fg:'#B23A7A' }, // 粉
  { bg:'#E6EAFB', fg:'#3A4FB2' }, // 靛
  { bg:'#EAF5DE', fg:'#5C8A1F' }, // 萊姆綠
  { bg:'#F5E6DC', fg:'#8A5A2F' }, // 棕
  { bg:'#EDEDED', fg:'#666666' }  // 灰
];

// 每次畫維修紀錄頁面時，根據當下實際出現的狀態種類重新分配顏色。
// 用排序過的順序來分配色盤，只要狀態種類沒變，同一個狀態每次算出來的顏色都會一樣。
let REPAIR_STATUS_COLOR_MAP = {};
function buildRepairStatusColorMap(statusSet){
  const map = {};
  let paletteIdx = 0;
  [...statusSet].sort().forEach(s=>{
    map[s] = REPAIR_KNOWN_COLORS[s] || REPAIR_COLOR_PALETTE[(paletteIdx++) % REPAIR_COLOR_PALETTE.length];
  });
  return map;
}
function repairStatusColor(status){
  return REPAIR_STATUS_COLOR_MAP[status] || DEFAULT_STATUS_COLOR;
}
function repairStatusBadgeHtml(status){
  const c = repairStatusColor(status);
  return `<span class="badge" style="background:${c.bg};color:${c.fg};">${fmt(status)}</span>`;
}

// 機台詳情視窗裡「狀態進度條」用的順序，代表實際的維修流程（跟總覽頁的排序目的不同）
const STEPPER_ORDER = [
  '台灣倉', '在途 - 台灣 TO NID', 'NID - 良品', 'NLA - 良品',
  'STORE', 'STORE - 異常', 'NID - 待退回台灣', '在途-NID TO 台灣', '台灣維修中'
];

function statusColor(status){
  return STATUS_COLORS[status] || DEFAULT_STATUS_COLOR;
}

// 機台「類型」沒有固定的清單（可能隨時新增新類型），所以用一組固定色盤，
// 依類型名稱算一個固定的雜湊值來選色，同一個類型每次畫面重繪都會拿到同一個顏色。
const TYPE_PALETTE = [
  { bg:'#E8F0FB', fg:'#2B5FA5' }, // 藍
  { bg:'#F1E7FB', fg:'#7A3AB2' }, // 紫
  { bg:'#FBEFDD', fg:'#B8752A' }, // 橙
  { bg:'#E1F5F0', fg:'#1F8A72' }, // 青
  { bg:'#FDE8F3', fg:'#A03D77' }, // 粉
  { bg:'#EAF2D7', fg:'#5C7A29' }, // 橄欖綠
  { bg:'#FBE0E0', fg:'#8A1F1F' }, // 深紅
  { bg:'#EDEDED', fg:'#666666' }  // 灰
];
function typeColor(type){
  if(!type) return DEFAULT_STATUS_COLOR;
  let hash = 0;
  for(let i=0;i<type.length;i++){ hash = (hash*31 + type.charCodeAt(i)) >>> 0; }
  return TYPE_PALETTE[hash % TYPE_PALETTE.length];
}
function statusBadgeHtml(status){
  const c = statusColor(status);
  return `<span class="badge" style="background:${c.bg};color:${c.fg};">${fmt(status)}</span>`;
}
function orderedStatuses(statusMap){
  const keys = Object.keys(statusMap);
  const ordered = STATUS_ORDER.filter(s=>keys.includes(s));
  const rest = keys.filter(k=>!STATUS_ORDER.includes(k)).sort();
  return ordered.concat(rest);
}

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function fmt(v){ return (v===null||v===undefined||v==='') ? '—' : v; }

function fmtDate(v){
  if(v===null||v===undefined||v==='') return '—';
  // 有些儲存格裡會手動填超過一個日期（例如用換行分開的「2025/09/10」「2026/02/10」），
  // 這裡把裡面所有看起來像日期的片段都抓出來，統一成 YYYY-MM-DD 格式，每個各自換行顯示。
  const matches = String(v).match(/\d{4}[-\/]\d{2}[-\/]\d{2}/g);
  if(!matches || !matches.length) return v;
  return matches.map(d=>d.replace(/\//g,'-')).join('<br>');
}

// 給 <input type="date"> 用：只取儲存格裡的第一個日期（date 輸入框沒辦法放多個值）
function firstDateOnly(v){
  if(v===null||v===undefined||v==='') return '';
  const m = String(v).match(/\d{4}[-\/]\d{2}[-\/]\d{2}/);
  return m ? m[0].replace(/\//g,'-') : '';
}

// 有些 Google Sheet 標題儲存格裡藏了換行符號（例如「機器損壞時間\n（NID出貨）」），
// 這個函式會先試試看完全對應的欄位名稱，找不到的話再忽略換行/空白去比對一次。
function getField(obj, key){
  if(obj[key] !== undefined) return obj[key];
  const normalize = s => s.replace(/[\s\n\r]+/g,'').replace(/[（）]/g,m=>m==='（'?'(':')');
  const targetNorm = normalize(key);
  for(const k in obj){
    if(normalize(k) === targetNorm) return obj[k];
  }
  return null;
}

// 搜尋框用的 debounce：使用者停止打字一小段時間後才重新畫表格，
// 避免資料量大時每敲一個字就整張表重新 render 造成卡頓。
function debounce(fn, wait=250){
  let timer = null;
  return function(...args){
    clearTimeout(timer);
    timer = setTimeout(()=>fn.apply(this,args), wait);
  };
}

// 產生跟後端 nowStr() 格式一致的本機時間字串，用於新增/更新後的「樂觀更新」畫面顯示，
// 之後背景資料重新整理時會被伺服器實際時間覆蓋過去。
function clientNowStr(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

/* ---------- API ---------- */

async function fetchData(){
  if(!API_URL){ renderNoApi(); return; }
  $('#statusLine').textContent = '載入中…';
  try{
    const res = await fetch(API_URL + '?action=data');
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    DATA = json;
    $('#statusLine').textContent = '已連線・共 ' + (DATA.machines||[]).length + ' 筆機台資料';
    render();
  }catch(err){
    $('#statusLine').textContent = '連線失敗：' + err.message;
    $('#main').innerHTML = '<div class="panel"><div class="msg error">讀取資料失敗，請確認 API 位址是否正確、Apps Script 是否已部署為「任何人」可存取。<br>錯誤訊息：'+err.message+'</div></div>';
  }
}

async function callApi(payload){
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json.result;
}

/* ---------- settings helpers ---------- */

function settingValues(key){

  return (DATA.settings||[]).filter(r=>r.key===key).map(r=>r.value);

// 有些機台會經過第 2、第 3…次維修循環，每次循環出貨到 STORE 時可能會換一個新店號
// （Sheet 裡對應欄位例如「2-店號」「3-店號」）。這裡統一算出：
// 1. 目前應該顯示的「有效店號」：以編號最大、且有填值的那個「N-店號」為準，
//    找不到就退回最原始的 store_no。
// 2. 這台機器目前跑到第幾次循環（沒有任何「N-」欄位有值就是第 1 次）。
function getMachineCycleInfo(m){
  const cycles = getMachineCycles(m); // { '2': [{field,val}, ...], '3': [...] }
  let cycleCount = 1;
  let effectiveStoreNo = m.store_no;

  Object.keys(cycles).map(Number).sort((a,b)=>a-b).forEach(num=>{
    const items = cycles[num];
    const hasData = items.some(it=>it.val!==null && it.val!==undefined && it.val!=='');
    if(hasData) cycleCount = Math.max(cycleCount, num);

    const storeItem = items.find(it=>it.field==='店號');
    if(storeItem && storeItem.val!==null && storeItem.val!==undefined && storeItem.val!==''){
      effectiveStoreNo = storeItem.val;
    }
  });

  return { cycleCount, effectiveStoreNo, isRepeat: cycleCount > 1 };
}

function cycleBadgeHtml(info){
  if(!info.isRepeat) return '';
  return ` <span class="badge" style="background:#F1E7FB;color:#7A3AB2;">第${info.cycleCount}次循環</span>`;
}

/* ---------- stats ---------- */

function computeStats(){
  const machines = DATA.machines || [];
  const inventory = DATA.inventory || [];

  const storeNos = new Set();
  machines.forEach(m=>{
    if(m.status === 'STORE' || m.status === 'STORE - 異常'){
      const effective = getMachineCycleInfo(m).effectiveStoreNo;
      const n = Number(effective);
      if(effective !== null && effective !== undefined && effective !== '' && !isNaN(n)) storeNos.add(n);
    }
  });

  const lowStock = inventory.filter(i=>{
    const q = parseFloat(String(i.quantity).replace('+',''));
    const min = Number(i.min_qty);
    return !isNaN(q) && !isNaN(min) && q < min;
  });

  const repairing = machines.filter(m=>m.status === '台灣維修中').length;

  const byType = {};
  const byTypeStatus = {};
  machines.forEach(m=>{
    byType[m.type] = (byType[m.type]||0)+1;
    if(!byTypeStatus[m.type]) byTypeStatus[m.type] = {};
    byTypeStatus[m.type][m.status] = (byTypeStatus[m.type][m.status]||0)+1;
  });

  return { storeCount: storeNos.size, lowStock, repairing, byType, byTypeStatus, total: machines.length };
}

// 掃描機台物件裡帶有「數字-欄位名稱」格式的欄位（例如 "2-NID入庫"），
// 自動歸類成第幾次維修循環，不需要另外開分頁、不需要改變填寫習慣。
function getMachineCycles(m){
  const cycles = {};
  for(const key in m){
    const match = key.match(/^(\d+)-(.+)$/);
    if(match){
      const num = match[1], field = match[2].trim();
      const val = m[key];
      if(val === null || val === undefined || val === '') continue;
      if(!cycles[num]) cycles[num] = [];
      cycles[num].push({ field, val });
    }
  }
  return cycles;
}

const CYCLE_1_FIELDS = ['機器損壞時間（NID出貨）','NID入庫（不良品）','台灣入庫（不良品）'];

function renderDetailTimeline(sn){
  const m = (DATA.machines||[]).find(x=>x.sn===sn);
  if(!m){ $('#detailTimeline').innerHTML = '<div class="empty">找不到機台資料</div>'; return; }

  const blocks = [];

  // 第一次循環：既有的 3 個欄位（不用前綴）
  const cycle1 = CYCLE_1_FIELDS
    .map(f=>({ field:f, val:getField(m,f) }))
    .filter(x=>x.val !== null && x.val !== undefined && x.val !== '');
  if(cycle1.length) blocks.push({ label:'第 1 次循環', items:cycle1 });

  // 第 2 次以後：自動偵測「數字-欄位名稱」格式的欄位
  const cycles = getMachineCycles(m);
  Object.keys(cycles).sort((a,b)=>Number(a)-Number(b)).forEach(num=>{
    blocks.push({ label:`第 ${num} 次循環`, items:cycles[num] });
  });

  if(!blocks.length){
    $('#detailTimeline').innerHTML = '<div class="empty">尚無生命週期紀錄</div>';
    return;
  }

  $('#detailTimeline').innerHTML = blocks.map(block=>`
    <div class="tl-block">
      <div class="tl-block-title">${block.label}</div>
      ${block.items.map(it=>`
        <div class="tl-item">
          <div class="tl-dot"></div>
          <div class="tl-content">
            <div class="tl-event">${fmt(it.field)}</div>
            <div class="tl-meta">${/^\d{4}-\d{2}-\d{2}/.test(String(it.val)) ? fmtDate(it.val) : fmt(it.val)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderDetailLog(sn){
  const logs = (DATA.machine_log||[]).filter(l=>l.sn===sn).slice().reverse();
  $('#detailLogRows').innerHTML = logs.length ? logs.map(l=>`

        <thead><tr>
          <th>機器號</th><th>類型</th><th>狀態</th><th>店號</th><th>問題描述</th>
          <th>機器損壞時間（NID出貨）</th><th>NID入庫（不良品）</th><th>台灣入庫（不良品）</th>
        </tr></thead>
        <tbody id="machineRows"></tbody>
      </table></div>
    </div>
  `;
  $('#addMachineBtn').onclick = openMachineModal;
  $('#searchSn').oninput = debounce(drawMachineRows);
  $('#searchStoreNo').oninput = debounce(drawMachineRows);
  $('#clearStoreNo').onclick = ()=>{ $('#searchStoreNo').value=''; drawMachineRows(); };
  $('#cycleFilter').onchange = ()=>{ machineFilterCycle = $('#cycleFilter').value; drawMachineRows(); };

  $$('#statusFilterRow .filter-pill').forEach(btn=>{
    btn.onclick = ()=>{
      machineFilterStatus = btn.dataset.status;
      $$('#statusFilterRow .filter-pill').forEach(b=>b.classList.toggle('active', b===btn));
      drawMachineRows();
    };
  });
  $$('#typeFilterRow .filter-pill').forEach(btn=>{
    btn.onclick = ()=>{
      machineFilterType = btn.dataset.type;
      $$('#typeFilterRow .filter-pill').forEach(b=>b.classList.toggle('active', b===btn));
      drawMachineRows();
    };
  });

  drawMachineRows();
}

function drawMachineRows(){
  const search = ($('#searchSn').value||'').toLowerCase();
  const storeNoSearch = ($('#searchStoreNo').value||'').toLowerCase();
  let rows = DATA.machines || [];
  if(search) rows = rows.filter(m=>(m.sn||'').toLowerCase().includes(search));
  if(storeNoSearch) rows = rows.filter(m=>{
    // 同時比對原始 store_no 跟二次出貨後的新店號，不然搜尋新店號會找不到機台
    const info = getMachineCycleInfo(m);
    return String(m.store_no||'').toLowerCase().includes(storeNoSearch)
      || String(info.effectiveStoreNo||'').toLowerCase().includes(storeNoSearch);
  });
  if(machineFilterType) rows = rows.filter(m=>m.type===machineFilterType);
  if(machineFilterStatus) rows = rows.filter(m=>m.status===machineFilterStatus);
  if(machineFilterCycle) rows = rows.filter(m=>getMachineCycleInfo(m).cycleCount === Number(machineFilterCycle));

  $('#machineCount').textContent = `共 ${rows.length} 筆`;

  $('#machineRows').innerHTML = rows.map(m=>{
    const info = getMachineCycleInfo(m);
    return `
    <tr>
      <td>${fmt(m.sn)}${cycleBadgeHtml(info)}</td><td>${fmt(m.type)}</td><td>${statusBadgeHtml(m.status)}</td>
      <td>${fmt(info.effectiveStoreNo)}</td><td>${fmt(m.issue)}</td>
      <td>${fmtDate(getField(m,'機器損壞時間（NID出貨）'))}</td>
      <td>${fmtDate(getField(m,'NID入庫（不良品）'))}</td>
      <td>${fmtDate(getField(m,'台灣入庫（不良品）'))}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="empty">沒有符合條件的機台</td></tr>';
}

function renderInventory(){
  const rows = DATA.inventory || [];
  $('#main').innerHTML = `
    <div class="panel">
      <div class="table-wrap"><table>
        <thead><tr><th>模組</th><th>分類</th><th>品名</th><th>規格</th><th>庫存</th><th>最低庫存</th><th>備註</th></tr></thead>
        <tbody>${rows.map(i=>{
          const q = parseFloat(String(i.quantity).replace('+',''));
          const min = Number(i.min_qty);
          const low = !isNaN(q) && !isNaN(min) && q < min;
          return `<tr>
            <td>${fmt(i.module)}</td><td>${fmt(i.category)}</td><td>${fmt(i.name)}</td><td>${fmt(i.spec)}</td>
            <td>${low?`<span class="badge low">${fmt(i.quantity)}</span>`:fmt(i.quantity)}</td>
            <td>${fmt(i.min_qty)}</td><td>${fmt(i.note)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  `;
}

let repairFilterStatus = '';
let repairSearchSn = '';
let repairVisitCounts = new Map(); // r._row -> 這台機器第幾次出現在維修紀錄裡

// 依 NO 由小到大排序，算出同一個「機器編號」第幾次出現在維修紀錄裡（第 1 次、第 2 次…）。
// 用來標示「這台機器又回廠維修了」。
function computeRepairVisitCounts(rows){
  const counts = {};
  const result = new Map();
  const sorted = [...rows].sort((a,b)=> (Number(getField(a,'NO'))||0) - (Number(getField(b,'NO'))||0));
  sorted.forEach(r=>{
    const sn = getField(r,'機器編號');
    if(!sn) return;
    counts[sn] = (counts[sn]||0) + 1;
    result.set(r._row, counts[sn]);
  });
  return result;
}

// 只要「檢修問題／更換零件／檢修完成日期／檢修人員」這 4 個欄位任一個有值，就算已經填寫過維修紀錄歷程
function hasRepairDetailFilled(r){
  return !!(getField(r,'檢修問題') || getField(r,'更換零件') || getField(r,'檢修完成日期') || getField(r,'檢修人員'));
}

function renderRepair(){
  repairFilterStatus = '';
  const initialSearch = pendingRepairSearchSn || '';
  pendingRepairSearchSn = null;
  repairSearchSn = initialSearch.toLowerCase();
  const rows = DATA.repair_log || [];
  // key 是 Google Sheet 裡實際的欄位名稱（讀取資料用），label 是畫面上要顯示的文字。
  // getField() 內建會忽略欄位名稱裡的換行/空白差異，所以「機器退至NID\n日期\n（MO系統）」
  // 這種因為儲存格換行而看起來分行的標題也能對得上。
  const cols = [
    { key:'NO', label:'NO' },
    { key:'機器狀態', label:'機器狀態' },
    { key:'機器編號', label:'機器編號' },
    { key:'店號', label:'店號' },
    { key:'問題回報', label:'問題回報' },
    { key:'案件編號', label:'案件編號' },
    { key:'其他資訊', label:'其他資訊' },
    { key:'機器退至NID日期（MO系統）', label:'機器退至NID日期' },
    { key:'NID回台灣日期', label:'NID回台灣日期' },
    { key:'入芳苑日期', label:'入芳苑日期' },
    { key:'維修出庫日期', label:'維修出庫日期' }
  ];
  const dateKeys = ['機器退至NID日期（MO系統）','NID回台灣日期','入芳苑日期','維修出庫日期'];

  const statusSet = new Set(rows.map(r=>getField(r,'機器狀態')).filter(Boolean));
  REPAIR_STATUS_COLOR_MAP = buildRepairStatusColorMap(statusSet);
  const statuses = REPAIR_STATUS_ORDER.filter(s=>statusSet.has(s)).concat([...statusSet].filter(s=>!REPAIR_STATUS_ORDER.includes(s)).sort());
  const statusCounts = {};
  rows.forEach(r=>{
    const s = getField(r,'機器狀態');
    if(s) statusCounts[s] = (statusCounts[s]||0)+1;
  });

  // 同一台機器（機器編號）如果在維修紀錄裡出現不只一次，代表它又回廠維修過。
  // 依 NO 由小到大排序，算出每一列是這台機器第幾次出現，超過第 1 次就顯示「第N次入廠」標籤。
  repairVisitCounts = computeRepairVisitCounts(rows);

  $('#main').innerHTML = `
    <div class="panel">
      <div class="toolbar">
        <input type="text" id="repairSearchSn" placeholder="搜尋機台序號 (sn)" value="${initialSearch}">
        <span class="page-info" id="repairCount"></span>
      </div>
      <div class="filter-pill-row" id="repairStatusFilterRow">
        <button class="filter-pill active" data-status="">全部 (${rows.length})</button>
        ${statuses.map(s=>{
          const c = repairStatusColor(s);
          return `<button class="filter-pill" data-status="${s}" style="--pill-bg:${c.bg};--pill-fg:${c.fg};">${s} (${statusCounts[s]||0})</button>`;
        }).join('')}
      </div>
      <div class="table-wrap"><table>
        <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}<th>維修紀錄歷程</th></tr></thead>
        <tbody id="repairRows"></tbody>
      </table></div>
    </div>
  `;

  $('#repairSearchSn').oninput = debounce(()=>{
    repairSearchSn = $('#repairSearchSn').value.toLowerCase();
    drawRepairRows(rows, cols, dateKeys);
  });

  $$('#repairStatusFilterRow .filter-pill').forEach(btn=>{
    btn.onclick = ()=>{
      repairFilterStatus = btn.dataset.status;
      $$('#repairStatusFilterRow .filter-pill').forEach(b=>b.classList.toggle('active', b===btn));
      drawRepairRows(rows, cols, dateKeys);
    };
  });

  drawRepairRows(rows, cols, dateKeys);
}

function drawRepairRows(rows, cols, dateKeys){
  let filtered = repairFilterStatus ? rows.filter(r=>getField(r,'機器狀態')===repairFilterStatus) : rows;
  if(repairSearchSn) filtered = filtered.filter(r=>String(getField(r,'機器編號')||'').toLowerCase().includes(repairSearchSn));
  $('#repairCount').textContent = `共 ${filtered.length} 筆`;
  $('#repairRows').innerHTML = filtered.length ? filtered.map(r=>{
    const visit = repairVisitCounts.get(r._row) || 1;
    const filled = hasRepairDetailFilled(r);
    const cellsHtml = cols.map(c=>{
      if(c.key==='機器狀態') return `<td>${repairStatusBadgeHtml(getField(r,c.key))}</td>`;
      if(c.key==='機器編號'){
        const badge = visit>1 ? ` <span class="badge" style="background:#F1E7FB;color:#7A3AB2;">第${visit}次入廠</span>` : '';
        return `<td>${fmt(getField(r,c.key))}${badge}</td>`;
      }
      return `<td>${dateKeys.includes(c.key) ? fmtDate(getField(r,c.key)) : fmt(getField(r,c.key))}</td>`;
    }).join('');
    return `<tr>${cellsHtml}<td><button class="btn ${filled?'':'secondary'}" onclick="openRepairDetailModal(${r._row})">維修紀錄歷程</button></td></tr>`;
  }).join('') : `<tr><td colspan="${cols.length+1}" class="empty">沒有符合條件的維修紀錄</td></tr>`;
}

// 目前詳情視窗開著的是哪一列（Google Sheet 實際列號），儲存時要用這個定位
let currentRepairRow = null;

function openRepairDetailModal(rowIndex){
  const r = (DATA.repair_log||[]).find(x=>x._row===rowIndex);
  if(!r) return;
  currentRepairRow = rowIndex;

  $('#rd_operator').innerHTML = '<option value="">請選擇</option>' + settingValues('operator').map(o=>`<option value="${o}">${o}</option>`).join('');

  $('#repairDetailInfo').innerHTML = `機器編號：<strong>${fmt(getField(r,'機器編號'))}</strong>　店號：${fmt(getField(r,'店號'))}　案件編號：${fmt(getField(r,'案件編號'))}`;
  $('#rd_issue').value = getField(r,'問題回報') || '';
  $('#rd_other_issue').value = getField(r,'檢修問題') || '';
  $('#rd_parts').value = getField(r,'更換零件') || '';
  const doneDate = getField(r,'檢修完成日期');
  $('#rd_done_date').value = firstDateOnly(doneDate);
  $('#rd_operator').value = getField(r,'檢修人員') || '';
  $('#repairDetailMsg').innerHTML = '';
  $('#repairDetailModal').classList.add('show');
}

function closeRepairDetailModal(){
  $('#repairDetailModal').classList.remove('show');
}
$('#repairDetailModalClose').onclick = closeRepairDetailModal;
$('#repairDetailCancel').onclick = closeRepairDetailModal;
$('#repairDetailModal').addEventListener('click', (e)=>{ if(e.target.id==='repairDetailModal') closeRepairDetailModal(); });

$('#repairDetailSave').onclick = async ()=>{
  if(currentRepairRow===null) return;
  const data = {
    '問題回報': $('#rd_issue').value || null,
    '檢修問題': $('#rd_other_issue').value || null,
    '更換零件': $('#rd_parts').value || null,
    '檢修完成日期': $('#rd_done_date').value || null,
    '檢修人員': $('#rd_operator').value || null
  };
  try{
    await callApi({ action:'updateRepairLog', row: currentRepairRow, data });
    // 樂觀更新：直接改本地資料重畫表格，不用整包重新呼叫 fetchData()
    const r = (DATA.repair_log||[]).find(x=>x._row===currentRepairRow);
    if(r) Object.assign(r, data);
    closeRepairDetailModal();
    if(currentTab==='repair') render();
  }catch(err){
    $('#repairDetailMsg').innerHTML = '<div class="msg error">儲存失敗：'+err.message+'</div>';
  }
};

function renderLowStock(){
  const s = computeStats();
  $('#main').innerHTML = `
    <div class="panel">
      <h3 style="margin-top:0;">低庫存零件清單</h3>
      <div class="note" style="margin-bottom:14px;color:var(--ink-soft);font-size:13px;">共 ${s.lowStock.length} 項・數量 &lt; 最低庫存</div>
      <div class="table-wrap"><table>
        <thead><tr><th>品名</th><th>模組</th><th>分類</th><th>目前庫存</th><th>最低庫存</th><th>備註</th></tr></thead>
        <tbody>${s.lowStock.length ? s.lowStock.map(i=>`

            <td><span class="badge low">${fmt(i.quantity)}</span></td><td>${fmt(i.min_qty)}</td><td>${fmt(i.note)}</td>

/* ---------- 新增機台 modal ---------- */

function openMachineModal(){
  const types = settingValues('type');
  const statuses = settingValues('status');
  $('#m_type').innerHTML = types.map(t=>`<option value="${t}">${t}</option>`).join('');
  $('#m_status').innerHTML = statuses.map(s=>`<option value="${s}">${s}</option>`).join('');
  $('#m_sn').value=''; $('#m_store_no').value=''; $('#m_issue').value=''; $('#m_owner').value='';
  $('#machineMsg').innerHTML='';
  $('#machineModal').classList.add('show');
}

$('#machineCancel').onclick = ()=> $('#machineModal').classList.remove('show');

$('#machineSave').onclick = async ()=>{
  const sn = $('#m_sn').value.trim();
  if(!sn){ $('#machineMsg').innerHTML = '<div class="msg error">請輸入機台序號</div>'; return; }
  const data = {
    sn, type: $('#m_type').value, status: $('#m_status').value,
    store_no: $('#m_store_no').value || null,
    issue: $('#m_issue').value || null,
    owner: $('#m_owner').value || null
  };
  try{
    await callApi({ action:'addMachine', data });
    // 樂觀更新：後端已寫入成功，直接把這筆機台加進本地資料並重畫畫面，
    // 不用整包重新呼叫 fetchData()（那會把 7 個分頁全部重抓一次）。
    const now = clientNowStr();
    DATA.machines = DATA.machines || [];
    DATA.machines.push(Object.assign({}, data, { created_at: now, updated_at: now, updated_by: null, batch: null }));
    $('#machineModal').classList.remove('show');
    $('#statusLine').textContent = '已連線・共 ' + DATA.machines.length + ' 筆機台資料';
    currentTab='machines'; setActiveTab('machines'); render();
  }catch(err){
    $('#machineMsg').innerHTML = '<div class="msg error">新增失敗：'+err.message+'</div>';
  }
};

/* ---------- API 設定 modal ---------- */

$('#apiBtn').onclick = ()=>{
  $('#apiUrlInput').value = API_URL;
  $('#apiMsg').innerHTML='';
  $('#apiModal').classList.add('show');
};
$('#apiCancel').onclick = ()=> $('#apiModal').classList.remove('show');
$('#apiSave').onclick = async ()=>{
  const url = $('#apiUrlInput').value.trim();
  if(!url){ $('#apiMsg').innerHTML='<div class="msg error">請輸入網址</div>'; return; }
  API_URL = url;
  localStorage.setItem(LS_KEY, url);
  $('#apiModal').classList.remove('show');
  await fetchData();
};

$('#detailModalClose').onclick = ()=> $('#detailModal').classList.remove('show');
$('#detailModalClose2').onclick = ()=> $('#detailModal').classList.remove('show');
$('#detailModal').addEventListener('click', (e)=>{ if(e.target.id==='detailModal') $('#detailModal').classList.remove('show'); });

let currentDetailSn = null;

$('#d_issueEditBtn').onclick = ()=>{
  $('#d_issueEditRow').style.display = 'block';
};
// 找出本地 DATA.machines 裡對應 sn 的機台物件並就地合併欄位，
// 讓畫面立刻反映最新狀態，不用每次都整包重新呼叫 fetchData()。
function patchMachineLocal(sn, patch){
  const m = (DATA.machines||[]).find(x=>x.sn===sn);
  if(m) Object.assign(m, patch);
  return m;
}

$('#d_issueSaveBtn').onclick = async ()=>{
  const newIssue = $('#d_issueInput').value;
  try{
    await callApi({ action:'updateMachine', sn: currentDetailSn, data:{ issue: newIssue } });
    patchMachineLocal(currentDetailSn, { issue: newIssue, updated_at: clientNowStr() });
    openDetailModal(currentDetailSn);
  }catch(err){
    $('#detailMsg').innerHTML = '<div class="msg error">更新問題描述失敗：'+err.message+'</div>';
  }
};

$('#d_updateBtn').onclick = async ()=>{
  const sn = currentDetailSn;
  const newStatus = $('#d_status').value;
  const operator = $('#d_operator').value;
  const note = $('#d_note').value;
  const parts = $('#d_parts').value;
  $('#detailMsg').innerHTML = '';
  try{
    await callApi({ action:'updateMachine', sn: sn, data:{ status: newStatus }, operator: operator || undefined });
    await callApi({ action:'addMachineLog', data:{ sn: sn, step: newStatus, note: note, parts: parts, operator: operator } });
    const now = clientNowStr();
    patchMachineLocal(sn, { status: newStatus, updated_at: now, updated_by: operator || undefined });
    DATA.machine_log = DATA.machine_log || [];
    DATA.machine_log.push({ sn: sn, step: newStatus, note: note, parts: parts, operator: operator, timestamp: now });
    openDetailModal(sn);
    $('#detailMsg').innerHTML = '<div class="msg ok">已更新狀態並記錄操作</div>';
  }catch(err){
    $('#detailMsg').innerHTML = '<div class="msg error">更新失敗：'+err.message+'</div>';
  }
};

/* ---------- tabs ---------- */

function setActiveTab(tab){
  $$('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
}
$$('#tabs button').forEach(btn=>{
  btn.onclick = ()=>{
    currentTab = btn.dataset.tab;
    setActiveTab(currentTab);
    render();
  };
});

/* ---------- init ---------- */

fetchData();
